name: C CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential valgrind

      - name: Build debug
        run: make clean && make debug

      - name: Run tests (ASan + UBSan + LeakSanitizer)
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1:strict_string_checks=1
          UBSAN_OPTIONS: print_stacktrace=1
        run: make test

      - name: Build release
        run: make clean && make release

      - name: Run Valgrind
        run: |
          valgrind \
            --leak-check=full \
            --show-leak-kinds=all \
            --track-origins=yes \
            --errors-for-leak-kinds=all \
            --error-exitcode=1 \
            ./bin/tests
